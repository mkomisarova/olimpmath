<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname
        var filePattern = /\/[^/]+\.[^/]+$/

        if (!filePattern.test(path)) {
          var query = '?p=' + encodeURIComponent(path + window.location.search + window.location.hash)
          window.location.replace('/olimpmath/' + query)
        }
      })()
    </script>
  </head>
  <body></body>
</html>
